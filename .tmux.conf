# tmux config — sane defaults

# Colors: truecolor + Ghostty
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"

set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# Windows/panes start at 1, auto-renumber
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# vi-style copy mode
setw -g mode-keys vi

# Reload config: prefix r
unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Splits inherit cwd; intuitive | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Cheatsheet: prefix + ? (popup, any key closes)
bind ? display-popup -w 60 -h 22 -E "printf '\
  TMUX — CHEATSHEET  (prefix = Ctrl+b)\n\
  ───────────────────────────────────\n\
  PANES\n\
    |        split right (vertical)\n\
    -        split below (horizontal)\n\
    h j k l  move between panes\n\
    o        next pane\n\
    z        zoom (full / back)\n\
    x        close pane\n\
    space    cycle layouts\n\n\
  WINDOWS\n\
    c        new window\n\
    n / p    next / previous\n\
    0-9      window by number\n\
    ,        rename window\n\n\
  SESSION\n\
    d        detach (session stays alive)\n\
    r        reload config\n\
    ?        this cheatsheet\n\n\
  [any key closes]'; read -k1"

# --- Plugins (TPM: prefix + I installs, prefix + U updates) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Catppuccin Mocha (matches Ghostty colors)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_application}'
set -agF status-right '#{E:@catppuccin_status_session}'

# Sessions survive a Mac restart (auto-save every 15 min + auto-restore)
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'   # MUST be the last line
