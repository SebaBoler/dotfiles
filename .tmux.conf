# tmux config — sane defaults, bez plugin managera

# Kolory: truecolor + Ghostty
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"

set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# Okna/panele liczone od 1, auto-renumber
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Tryb kopiowania jak w vi
setw -g mode-keys vi

# Reload configu: prefix r
unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Splity dziedziczą ścieżkę; intuicyjne | i -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Nawigacja paneli hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ściąga skrótów: prefix + ? (popup, dowolny klawisz zamyka)
bind ? display-popup -w 60 -h 22 -E "printf '\
  TMUX — ŚCIĄGA  (prefix = Ctrl+b)\n\
  ───────────────────────────────\n\
  PANELE\n\
    |        panel obok (pionowo)\n\
    -        panel pod spodem\n\
    h j k l  ruch między panelami\n\
    o        następny panel\n\
    z        zoom (pełny / powrót)\n\
    x        zamknij panel\n\
    spacja   układ paneli\n\n\
  OKNA\n\
    c        nowe okno\n\
    n / p    następne / poprzednie\n\
    0-9      okno po numerze\n\
    ,        zmień nazwę okna\n\n\
  SESJA\n\
    d        detach (sesja żyje)\n\
    r        reload configu\n\
    ?        ta ściąga\n\n\
  [dowolny klawisz zamyka]'; read -k1"

# --- Pluginy (TPM: prefix + I instaluje, prefix + U aktualizuje) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Catppuccin Mocha (pod kolory Ghostty)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_application}'
set -agF status-right '#{E:@catppuccin_status_session}'

# Sesje przeżywają restart Maca (auto-save co 15 min + auto-restore)
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'   # MUSI być ostatnią linią
